<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 Juego Cazando - Atrapa la Comida</title>
  <!-- Google Fonts para tipografía moderna -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="cazando.css">
  <script src="utilitarios.js"></script>
</head>
<body onload="iniciarJuego();">

  <!-- Decoraciones flotantes -->
  <div class="decorations">
    <img src="gato.png" class="decoration-img decoration-cat-top" alt="Decoración gato">
    <img src="comida.png" class="decoration-img decoration-food-top" alt="Decoración comida">
    <img src="gato.png" class="decoration-img decoration-cat-bottom" alt="Decoración gato">
    <img src="comida.png" class="decoration-img decoration-food-bottom" alt="Decoración comida">
  </div>

  <!-- Contenedor principal centrado -->
  <div class="main-container">
    
    <!-- Encabezado del juego -->
    <header class="game-header">
      <div class="header-badge">🎮 ARCADE GAME</div>
      <h1 class="game-title">
        <span class="title-emoji">🐱</span>
        JUEGO CAZANDO
        <span class="title-emoji">🍖</span>
      </h1>
      <p class="game-subtitle">¡Ayuda al gato a atrapar toda la comida antes de que se acabe el tiempo!</p>
      <div class="author-badge">
        <span class="author-icon">👤</span>
        <span class="author-text">Creado por <strong>Melany Nono</strong></span>
      </div>
    </header>

    <!-- Panel de estadísticas -->
    <div class="stats-panel">
      <div class="stat-card stat-score">
        <div class="stat-icon-wrapper">
          <span class="stat-emoji">🏆</span>
        </div>
        <div class="stat-info">
          <span class="stat-label">PUNTOS</span>
          <span class="stat-number" id="puntos">0</span>
        </div>
      </div>

      <div class="stat-card stat-time">
        <div class="stat-icon-wrapper">
          <span class="stat-emoji">⏱️</span>
        </div>
        <div class="stat-info">
          <span class="stat-label">TIEMPO</span>
          <span class="stat-number" id="tiempo">15</span>
        </div>
      </div>
    </div>

    <!-- Área del juego (Canvas) -->
    <div class="game-area">
      <!-- Decoración lateral izquierda -->
      <div class="side-decoration side-left">
        <img src="gato.png" class="side-img" alt="Gato">
        <div class="side-label">¡ATRAPA!</div>
      </div>

      <div class="canvas-container">
        <canvas id="areaJuego" width="500" height="500"></canvas>
        <div class="canvas-border"></div>
      </div>

      <!-- Decoración lateral derecha -->
      <div class="side-decoration side-right">
        <img src="raton.png" class="side-img" alt="Comida">
        <div class="side-label">¡LA COMIDA!</div>
      </div>
    </div>

    <!-- Panel de controles -->
    <div class="controls-panel">
      <!-- Decoración de mini imágenes sobre controles -->
      <div class="mini-decorations">
        <img src="gato.png" class="mini-deco" alt="mini gato">
        <img src="raton.png" class="mini-deco" alt="mini comida">
      </div>
      <h3 class="controls-title">⌨️ CONTROLES</h3>
      <div class="controls-grid">
        <div class="control-row">
          <button class="control-btn btn-up" onclick="moverArriba();" aria-label="Mover arriba">
            ⬆️
          </button>
        </div>
        <div class="control-row">
          <button class="control-btn btn-left" onclick="moverIzquierda();" aria-label="Mover izquierda">
            ⬅️
          </button>
          <button class="control-btn btn-down" onclick="moverAbajo();" aria-label="Mover abajo">
            ⬇️
          </button>
          <button class="control-btn btn-right" onclick="moverDerecha();" aria-label="Mover derecha">
            ➡️
          </button>
        </div>
      </div>
      
      <button class="restart-btn" onclick="reiniciarJuego();">
        <span class="btn-icon">🔄</span>
        <span class="btn-text">REINICIAR JUEGO</span>
      </button>
    </div>

    <!-- Mensaje de estado -->
    <div class="message-area">
      <p id="mensaje" class="game-message"></p>
    </div>

  </div>

  <script src="cazando.js"></script>

</body>
</html>
