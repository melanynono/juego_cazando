<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 Cat Hunter - Juego Cazando</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="cazando.css">
  <script src="utilitarios.js"></script>
</head>
<body onload="iniciarJuego();">

  <!-- Partículas animadas de fondo -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="game-container">
    <!-- Header con diseño gaming -->
    <div class="header">
      <div class="title-wrapper">
        <div class="game-badge">ARCADE</div>
        <h1>
          <span class="title-icon">🐱</span>
          <span class="title-text">CAZADOR FELINO</span>
          <span class="title-icon">🍖</span>
        </h1>
        <div class="subtitle">¡Atrapa toda la comida antes de que se acabe el tiempo!</div>
      </div>
      <p class="author">
        <span class="author-label">CREADO POR</span>
        <span class="author-name">MELANY NONO</span>
      </p>
    </div>

    <!-- Panel de estadísticas mejorado -->
    <div class="stats-container">
      <div class="panel">
        <div class="stat-box score-box">
          <div class="stat-header">
            <span class="stat-icon">🏆</span>
            <span class="stat-label">PUNTOS</span>
          </div>
          <div class="stat-value" id="puntos">0</div>
          <div class="stat-progress">
            <div class="progress-bar"></div>
          </div>
        </div>
        
        <div class="stat-box time-box">
          <div class="stat-header">
            <span class="stat-icon">⏱️</span>
            <span class="stat-label">TIEMPO</span>
          </div>
          <div class="stat-value" id="tiempo">10</div>
          <div class="time-indicator">
            <div class="time-bar"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Canvas con marco decorativo -->
    <div class="canvas-wrapper">
      <div class="canvas-frame">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        <canvas id="areaJuego" width="500" height="500"></canvas>
      </div>
    </div>

    <!-- Controles rediseñados -->
    <div class="controles">
      <div class="controls-label">CONTROLES</div>
      <div class="control-grid">
        <div class="control-row row-1">
          <button class="btn-direction btn-up" onclick="moverArriba();">
            <span class="btn-arrow">▲</span>
          </button>
        </div>
        <div class="control-row row-2">
          <button class="btn-direction btn-left" onclick="moverIzquierda();">
            <span class="btn-arrow">◀</span>
          </button>
          <button class="btn-direction btn-down" onclick="moverAbajo();">
            <span class="btn-arrow">▼</span>
          </button>
          <button class="btn-direction btn-right" onclick="moverDerecha();">
            <span class="btn-arrow">▶</span>
          </button>
        </div>
      </div>
      <button class="btn-restart" onclick="reiniciarJuego();">
        <span class="restart-icon">🔄</span>
        <span class="restart-text">NUEVA PARTIDA</span>
      </button>
    </div>

    <!-- Mensaje de estado -->
    <div class="message-container">
      <p id="mensaje"></p>
    </div>
  </div>

  <script src="cazando.js"></script>

</body>
</html>
